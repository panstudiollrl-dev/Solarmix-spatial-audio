name: Build or setup issue
description: Report a Unity, iOS, dataset, or setup problem.
title: "[Build]: "
labels: ["build", "bug"]
body:
  - type: input
    id: unity
    attributes:
      label: Unity version
      placeholder: "6000.4.x"
    validations:
      required: true
  - type: dropdown
    id: branch
    attributes:
      label: Branch
      options:
        - main / steam-audio
        - hifi-harp
        - meshRIR
        - mesh-rir
        - unknown
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Target platform
      placeholder: "macOS Editor, iOS, Android, WebGL"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Paste the relevant error message or summarize what failed.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps tried

